<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Era Albanian</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app-container">

    <!-- OVERLAY -->
    <div id="menu-overlay" class="hidden" onclick="toggleMenu()"></div>

    <!-- SIDE MENU -->
    <div id="side-menu" class="side-menu">
        <button class="close-menu" onclick="toggleMenu()">✖</button>

        <div style="padding: 20px 25px;">
            <button class="menu-btn" onclick="showScreen('screen-welcome')">Home</button>
            <button class="menu-btn" onclick="showScreen('screen-worlds')">Lessons Map</button>
            <button class="menu-btn" onclick="showScreen('screen-login')">Sign In</button>
        </div>
    </div>

    <!-- HEADER -->
    <header class="app-header">
        <div class="hamburger" onclick="toggleMenu()">☰</div>
        <img src="Eralogo.png" class="logo-small" alt="Era Logo">
        <div class="header-spacer"></div>
    </header>

    <!-- WELCOME -->
    <div id="screen-welcome" class="screen active">
        <section class="hero-section">
            <h1>Let’s Learn Albanian!</h1>
            <p>Play, explore, and unlock new words as you go!</p>
            <button class="btn" onclick="showScreen('screen-worlds')">
                Start Adventure
            </button>
        </section>
    </div>

    <!-- WORLDS -->
    <div id="screen-worlds" class="screen">
        <div id="worlds-container"></div>
    </div>

    <!-- QUIZ -->
    <div id="screen-quiz" class="screen">
        <h2 id="question-text"></h2>
        <div id="options-grid"></div>
        <p id="feedback"></p>
    </div>

    <!-- END -->
    <div id="screen-end" class="screen">
        <h2>Lesson Complete</h2>
        <p id="final-score"></p>
        <button class="btn" onclick="showScreen('screen-worlds')">Back</button>
    </div>

    <!-- LOGIN -->
    <div id="screen-login" class="screen">
        <h2 style="padding:20px;">Login</h2>
    </div>

</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
