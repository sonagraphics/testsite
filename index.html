<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Era Albanian</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <div id="menu-overlay" class="hidden" onclick="toggleMenu()"></div>
        <div id="side-menu" class="side-menu">
            <div class="menu-item" onclick="showScreen('screen-welcome')">Home</div>
            <div class="menu-item" onclick="showScreen('screen-worlds')">Lesson Map</div>
            <div class="menu-item" onclick="location.reload()">Reset App</div>
        </div>

        <header class="app-header">
            <div id="menu-trigger" onclick="toggleMenu()" style="cursor:pointer; font-size:1.2rem;">MENU</div>
            <img src="Eralogofinalwhite.png" class="logo-small">
            <div style="width:40px;"></div> </header>

        <div id="screen-login" class="screen active">
            <h2 style="color:var(--burgundy);">Welcome</h2>
            <p>Enter your name to begin.</p>
            <input type="text" id="username" class="auth-input" placeholder="Name">
            <button class="btn" onclick="handleLogin()">ENTER</button>
        </div>

        <div id="screen-welcome" class="screen">
            <h1 id="welcome-msg" style="color:var(--burgundy);">Welcome</h1>
            <p>Ready for your next lesson?</p>
            <button class="btn" onclick="showScreen('screen-worlds')">VIEW LESSONS</button>
        </div>

        <div id="screen-worlds" class="screen">
            <h2 style="color:var(--burgundy);">Lesson Map</h2>
            <div id="worlds-container" style="width:100%;"></div>
        </div>

        <div id="screen-quiz" class="screen">
            <div class="timer-container"><div id="timer-bar" class="timer-bar"></div></div>
            <div id="timer-text" style="font-size:0.9rem; font-weight:bold;">10s</div>
            <h2 id="question-text">Question</h2>
            <div class="options-grid" id="options-grid"></div>
            <p id="feedback" style="margin-top:20px; font-weight:bold;"></p>
        </div>

        <div id="screen-end" class="screen">
            <h2 style="color:var(--burgundy);">Lesson Finished</h2>
            <p id="final-score"></p>
            <button class="btn" onclick="showScreen('screen-worlds')">CONTINUE</button>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
