<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Era | Mëso Shqip!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="app-header">
        <div class="hamburger" onclick="toggleMenu()">☰</div>
        <img src="Eralogofinal-01.png" class="logo-small" alt="Era Logo">
        <div class="header-spacer"></div> 
    </header>

    <div id="side-menu" class="side-menu">
        <button class="close-menu" onclick="toggleMenu()">✖</button>
        <button class="menu-btn" onclick="openLogin()">👤 Sign In</button>
        <hr>
        <button class="menu-btn" onclick="showScreen('screen-welcome')">🏠 Home</button>
        <button class="menu-btn" onclick="showScreen('screen-worlds')">🗺️ Lessons Map</button>
    </div>
    <div id="menu-overlay" class="overlay hidden" onclick="toggleMenu()"></div>

    <div class="app-container">
        <div id="screen-welcome" class="screen active">
            <h1> Mirësevini!</h1>
            <div class="daily-tracker">
                <h3>🔥 Streak: <span id="streak-count">0</span> <span id="streak-icon">🕯️</span></h3>
                <div class="days-grid" id="tracker-days"></div>
                <button id="btn-checkin" class="btn" onclick="checkInToday()">Check In Today!</button>
            </div>
            <button class="btn bounce" onclick="showScreen('screen-worlds')">🗺️ Start Learning</button>
        </div>

        <div id="screen-worlds" class="screen">
            <h2>Choose a World!</h2>
            <div id="worlds-container" class="worlds-container"></div>
        </div>

        <div id="screen-quiz" class="screen">
            <div class="progress-header">
                <span id="quiz-title-display">Lesson</span>
                <span>Score: <span id="score-num">0</span></span>
            </div>
            <div class="timer-container"><div id="timer-bar" class="timer-bar"></div></div>
            <h2 id="question-text">Loading...</h2>
            <div class="options-grid" id="options-grid"></div>
            <p id="feedback"></p>
        </div>

        <div id="screen-end" class="screen">
            <h1>Bravo! 🌟</h1>
            <div class="huge-badge">🏆</div>
            <h2 id="final-score"></h2>
            <button class="btn" onclick="showScreen('screen-worlds')">Back to Map</button>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
